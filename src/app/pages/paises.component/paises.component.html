<mat-card class="contenedor">
  <mat-card-title>Registrar país</mat-card-title>

  <form [formGroup]="paisForm" (ngSubmit)="guardar()" class="formulario">
    <mat-form-field appearance="outline">
      <mat-label>Nombre del país</mat-label>
      <input matInput type="text" formControlName="nombre">
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit">
      {{ editando ? 'Actualizar' : 'Guardar' }}
    </button>
  </form>
</mat-card>

<mat-card class="contenedor">
  <mat-card-title>Lista de países</mat-card-title>

  <mat-list>
    <mat-list-item *ngFor="let p of paises">
      <span>{{ p.nombre }}</span>

      <button mat-button color="warn" type="button" (click)="editar(p)">
        Editar
      </button>
      <button mat-button color="warn" type="button" (click)="eliminar(p.id!)">
        Eliminar
      </button>
    </mat-list-item>
  </mat-list>
</mat-card>
